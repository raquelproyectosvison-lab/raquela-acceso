<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso a contenido exclusivo · Raquela</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      max-width: 420px;
      width: 100%;
      padding: 40px 30px;
    }

    .logo {
      text-align: center;
      margin-bottom: 8px;
    }

    .logo-circle {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #00c9b8, #00a896);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 28px;
      font-weight: 700;
      color: white;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #666;
      text-align: center;
      font-size: 15px;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      transition: all 0.2s;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.5px;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #00c9b8;
      background: #f9fffe;
      box-shadow: 0 0 0 3px rgba(0, 201, 184, 0.1);
    }

    input[type="text"]::placeholder {
      color: #aaa;
    }

    button {
      width: 100%;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 600;
      background: #00c9b8;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover:not(:disabled) {
      background: #00a896;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 201, 184, 0.3);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .message {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      display: none;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.error {
      background: #fee;
      color: #c33;
      border: 1px solid #fcc;
      display: block;
    }

    .message.success {
      background: #efe;
      color: #3c3;
      border: 1px solid #cfc;
      display: block;
    }

    .info-box {
      background: #f0f0f0;
      padding: 16px;
      border-radius: 8px;
      font-size: 13px;
      color: #555;
      margin-top: 24px;
      line-height: 1.6;
    }

    .info-box strong {
      color: #333;
    }

    .loading {
      display: none;
      text-align: center;
      color: #00c9b8;
      margin-top: 16px;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0, 201, 184, 0.2);
      border-top-color: #00c9b8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner-text {
      margin-top: 8px;
      font-size: 13px;
    }

    .footer-note {
      font-size: 11px;
      color: #999;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">
    <div class="logo-circle">R</div>
  </div>

  <h1>Acceso Exclusivo</h1>
  <p class="subtitle">Ingresa el código de tu producto para acceder a los contenidos</p>

  <form id="accessForm">
    <div class="form-group">
      <label for="code">Código de producto:</label>
      <input 
        type="text" 
        id="code" 
        placeholder="Ej: RAQUELA-GOLD-001" 
        autocomplete="off"
        required
      >
    </div>

    <button type="submit" id="submitBtn">Verificar acceso</button>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="spinner-text">Verificando tu código...</div>
    </div>

    <div class="message" id="message"></div>
  </form>

  <div class="info-box">
    💡 <strong>¿Dónde encuentro el código?</strong><br>
    Está impreso en la caja de tu producto, junto al código QR.
  </div>

  <div class="footer-note">
    Los códigos son válidos por 3 meses desde su primer uso.
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3lx2cGrAIAt979-p_gRoc7bOl-T38BhvwEhWouvXGljzT-vDPrvdcZxERkOKvCz8iRQ/exec";

  const form = document.getElementById('accessForm');
  const codeInput = document.getElementById('code');
  const message = document.getElementById('message');
  const loading = document.getElementById('loading');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const code = codeInput.value.trim().toUpperCase();

    if (!code) {
      showError('Por favor, ingresa un código');
      return;
    }

    loading.style.display = 'block';
    message.style.display = 'none';
    submitBtn.disabled = true;

    try {
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: new URLSearchParams({
          code: code
        })
      });

      const result = await response.json();

      if (result.success) {
        showSuccess('¡Acceso concedido! Redirigiendo...');
        setTimeout(() => {
          window.location.href = result.driveLink;
        }, 1500);
      } else {
        showError(result.message || 'Código no válido. Revisa que esté bien escrito.');
        codeInput.value = '';
        codeInput.focus();
      }

    } catch (error) {
      showError('Error de conexión. Intenta de nuevo.');
      console.error('Error:', error);
    }

    loading.style.display = 'none';
    submitBtn.disabled = false;
  });

  function showError(text) {
    message.textContent = text;
    message.className = 'message error';
    loading.style.display = 'none';
  }

  function showSuccess(text) {
    message.textContent = text;
    message.className = 'message success';
    loading.style.display = 'none';
  }

  window.addEventListener('load', () => {
    codeInput.focus();
  });

  codeInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      form.dispatchEvent(new Event('submit'));
    }
  });
</script>

</body>
</html>
